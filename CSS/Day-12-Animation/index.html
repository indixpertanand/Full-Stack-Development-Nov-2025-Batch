<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        a{        
            display: inline-block;    
            /* transition: color 1s 2s, transform 1s linear;
            transition-delay: 0s, 1s; */
            transition: all .6s 
        }
        a:hover{
            color: red;
            transform: scale(2) translateX(30px);
        }
        button:hover{
            animation-name: zoom-in;
            animation-duration: .6s;
            animation-delay: 0;
            animation-timing-function: ease;
            animation-fill-mode: both;
            animation-direction: alternate;
            animation-iteration-count: 1;
        }
        @keyframes zoom-in{
            from{
                scale: 1
            }
            to{
                scale: 1.2
            }
        }
        .container{
            width: 400px;
            height: 400px;
            padding: 10px;
            border: 5px solid #e0e0e0
        }
        .box{
            width: 80px;
            height: 80px;
            background: #f00;
            animation-name: move-box;
            animation-duration: 1s;
            animation-delay: 0;
            animation-timing-function: linear;
            animation-fill-mode: both;
            animation-direction: alternate;
            animation-iteration-count: infinite;
            
        }
        @keyframes move-box{
            0%{
                translate: 0px 0px;
                background-color: red
            }
            25%{
                translate: calc(400px - 110px) 0px;
                background-color: blue;
            }
            50%{
                translate: calc(400px - 110px) calc(400px - 110px);
                background-color: green;
            }
            75%{
                translate: 0px calc(400px - 110px);
                background-color: purple
            }
            100%{
                translate: 0px 0px;
                background-color: red
            }
        }

        .box2 {
  width: 50px;
  height: 50px;
  background-color: #4a9df8;
  /* Define the path shape using SVG syntax */
  offset-path: path("M 10,80 C 40,10 65,10 95,80 S 150,150 180,80");
  /* Animate movement along that path */
  animation: moveAlongPath 3s infinite linear;
}

@keyframes moveAlongPath {
  from {
    offset-distance: 0%;
  }
  to {
    offset-distance: 100%;
  }
}
    </style>
</head>
<body>
    <main>
        <a href="#">A link</a>
        <button>Click me</button>
        <div class="container">
            <div class="box"></div>
        </div>
        <div class="container">
            <div class="box2"></div>
        </div>
    </main>
</body>
</html>
