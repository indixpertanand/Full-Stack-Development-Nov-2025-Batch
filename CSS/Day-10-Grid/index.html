<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>CSS Grid</h1>
    </header>
    <main>
        <div class="d-grid grid-1 gap-20">
            <div class="grid-item">1</div>
            <div class="grid-item">2</div>
            <div class="grid-item">3</div>
            <div class="grid-item">4</div>
            <span class="grid-item">5</span>
        </div>
        <div class="d-grid grid-2 gap-20">
            <div class="grid-item">1</div>
        </div>
        <div class="d-grid grid-3 gap-20">
            <div class="grid-item">1</div>
        </div>

        <div class="d-grid grid-4">
            <header class="border">header</header>
            <aside class="border">Sidebar</aside>
            <main class="border">Main</main>
            <footer class="border">Footer</footer>
        </div>
    </main>
</body>
</html>
