<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display</title>
    <style>
        .box{
            height: 200px;
            background: gray;
            margin-top: 20px;
            padding: 20px
        }
        .d-none{
            display: none;
        }

        .d-inline{
            display: inline;
            padding: 0
        }
        .d-block{
            display: block;
        }
        .d-inline-block{
            display: inline-block;
            height: auto;
        }
        .d-flex{
            display: flex;
        }
        .d-grid{
            display: grid;
            grid-template-columns: 200px 200px 300px;
            grid-template-rows: 200px 200px 200px;
            gap: 20px
        }
        .grid-item{background: #000;}
        .grid-item:first-child{
            grid-row: 1/span 1;
            grid-column: 1/ span 2;
        }
        .grid-item:nth-child(2){
            grid-row: 1/span 2;
            grid-column: 3/ span 1;
        }
        .grid-item:nth-child(3){
            grid-row: 2/span 2;
            grid-column: 1/ span 2;
        }

        p.d-inline-block{
            padding: 10px;
            border: 1px solid red;
            font-weight: 600;
            font-size: 24px;
            outline: 10px solid green;
            outline-color: yellow;
            outline-offset: 10px;
        }
        .text-shadow{
            text-shadow: 2px 2px 4px red;
        }
        .box-shadow{
            box-shadow: 2px 2px 4px red;
        }
    </style>
</head>
<body>
    <header>
        <h1>CSS Display</h1>
    </header>
    <main>
        <span class="d-block">This is a span element</span>
        <div class="box d-inline">Box 1</div>
        <div class="box d-inline-block">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box d-none" aria-hidden="true">Box 4</div>
        <div class="d-flex">
            <div class="box">Box 5</div>
            <div class="box">Box 6</div>
        </div>

        <div class="d-grid">
            <div class="grid-item">item 1</div>
            <div class="grid-item">item 2</div>
            <div class="grid-item">item 3</div>
            <div class="grid-item">item 4</div>
        </div>
        <h2>Box Shadow</h2>

        <p class="text-shadow d-inline-block">This is a text</p>
        <p class="box-shadow d-inline-block">This is a text</p>
    </main>
</body>
</html>
