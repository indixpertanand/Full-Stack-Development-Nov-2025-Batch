<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tasks</title>
</head>
<body>
    <header><h1>Table Tasks</h1></header>
    <main>
        <section>
            <h2>Task 1</h2>

            <table width="600px" border>
                <tbody>
                    <tr>
                        <td width="100" rowspan="5">Side Image</td>
                        <td colspan="3">Logo</td>
                    </tr>
                    <tr>
                        <td colspan="3">
                            Email Body
                        </td>
                    </tr>
                    <tr>
                        <td height="20" colspan="3"></td>
                    </tr>
                    <tr height="50">
                        <td>Image</td>
                        <td>Image</td>
                        <td>Image</td>
                    </tr>
                    <tr>
                        <td colspan="3" height="40">Table Footer</td>
                    </tr>
                </tbody>
            </table>
        </section>
        <section>
            <h2>Task 2</h2>

            <table width="600px" border>
                <tbody>
                    <tr>
                        <td width="100" rowspan="5">Side Image</td>
                        <td colspan="6" height="40">Logo</td>
                    </tr>
                    <tr>
                        <td colspan="6" height="50">
                            Email Body
                        </td>
                    </tr>
                    <tr>
                        <td height="50" colspan="3">Image</td>
                        <td height="50" colspan="3">Image</td>
                    </tr>
                    <tr height="50">
                        <td colspan="2">Image</td>
                        <td colspan="2">Image</td>
                        <td colspan="2">Image</td>
                    </tr>
                    <tr>
                        <td colspan="6" height="30">Table Footer</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
